<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Om Sawant - Tech Lead & Full-Stack Developer. Get in touch for collaboration and internship opportunities.">
    <title>Contact Om Sawant | Get In Touch</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- External Styles -->
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 80px 20px;
        }

        .contact-form-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 50px;
            width: 100%;
            max-width: 600px;
            box-shadow: var(--shadow);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 14px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            transition: var(--transition);
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px -10px var(--primary);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px -10px var(--primary);
        }

        .contact-info {
            margin-top: 40px;
            text-align: center;
            border-top: 1px solid var(--glass-border);
            padding-top: 30px;
        }

        .contact-info p {
            margin-bottom: 8px;
            color: var(--text-dim);
        }
    </style>
</head>

<body>

    <main class="contact-container scroll-reveal visible">
        <div class="contact-form-card">
            <a href="index.html" class="back-link">← Back to Home</a>
            <h1 style="margin-bottom: 10px;">Let's Link Up!</h1>
            <p style="color: var(--text-dim); margin-bottom: 30px;">I'm open for collaboration, internships, and freelance projects.</p>
            
            <form action="#">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" placeholder="What's this about?" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="5" placeholder="Tell me more..." required></textarea>
                </div>
                <button type="submit" class="submit-btn" onclick="alert('Message Sent (Demo Mode)!')">Send Message</button>
            </form>

            <div class="contact-info">
                <p>Email: omoffice1305@gmail.com</p>
                <p>Phone: +91-9137883718</p>
                <div style="margin-top: 20px; display: flex; justify-content: center; gap: 15px;">
                    <a href="https://github.com/OmSawant13" target="_blank" class="skill-tag">GitHub</a>
                    <span class="skill-tag">LinkedIn</span>
                </div>
            </div>
        </div>
    </main>

    <!-- External Script -->
    <script src="script.js"></script>
</body>

</html>
