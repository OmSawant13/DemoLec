<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Om's Website</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background: #020617;
            position: sticky;
            top: 0;
        }

        nav h2 {
            color: #38bdf8;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        nav a:hover {
            color: #38bdf8;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 80px 20px;
        }

        .hero h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero p {
            color: #94a3b8;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #38bdf8;
            color: black;
            cursor: pointer;
            border-radius: 5px;
        }

        /* Sections */
        section {
            padding: 60px 40px;
            text-align: center;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
        }

        /* Contact */
        input,
        textarea {
            width: 250px;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background: #020617;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav>
        <h2>Om.dev</h2>
        <div>
            <a href="#home">Home</a>
            <a href="#about">Skills</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero" id="home">
        <h1>Hello, I'm Om 👋</h1>
        <p>I build cool stuff using AI & Web Dev</p>
        <button onclick="showMessage()">Click Me</button>
    </div>

    <!-- Skills -->
    <section id="about">
        <h2>My Skills</h2>
        <div class="card-container">
            <div class="card">HTML</div>
            <div class="card">CSS</div>
            <div class="card">JavaScript</div>
        </div>
    </section>

    <!-- Contact -->
    <section id="contact">
        <h2>Contact Me</h2>
        <form onsubmit="handleSubmit(event)">
            <input type="text" placeholder="Your Name" required><br>
            <input type="email" placeholder="Your Email" required><br>
            <textarea placeholder="Your Message"></textarea><br>
            <button type="submit">Send</button>
        </form>
        <p id="responseMsg"></p>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 Om | Built with ❤️</p>
    </footer>

    <!-- JavaScript -->
    <script>
        function showMessage() {
            alert("🔥 Bro you're learning fast!");
        }

        function handleSubmit(event) {
            event.preventDefault();
            document.getElementById("responseMsg").innerText = "✅ Message sent successfully!";
        }
    </script>

</body>

</html>
